services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jobfind_prod_app
    ports:
      - "127.0.0.1:8082:80"
    environment:
      DB_HOST: db
      DB_USER: jobfind
      DB_PASS: jobfind_pass
      DB_NAME: jobfinder
    volumes:
      - ./:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: jobfind_prod_db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: jobfinder
      MYSQL_USER: jobfind
      MYSQL_PASSWORD: jobfind_pass
    volumes:
      - jobfind_prod_db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  jobfind_prod_db_data:
